{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-2xl p-8">
        
        <!-- Titre -->
        <h2 class="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-4">
            {{ titre }}
        </h2>

        <!-- Formulaire -->
        <form method="post">
            {% csrf_token %}
            
            <div class="space-y-4">
                {% for field in form %}
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">
                        {{ field.label }}
                    </label>
                    {{ field }} <!-- C'est ici que s'affichent les inputs stylisés -->
                    {% if field.errors %}
                        <p class="text-red-500 text-xs italic mt-1">{{ field.errors }}</p>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

            <!-- Boutons -->
            <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-slate-700">
                <a href="{% url 'crm_view' %}" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-4 rounded transition">
                    Annuler
                </a>
                <button type="submit" class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold py-2 px-6 rounded shadow-lg shadow-yellow-500/20 transition">
                    💾 Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
