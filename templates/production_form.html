{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-6">
    <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-2xl p-8">
        <h2 class="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-4">{{ titre }}</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Ligne 1 -->
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Numéro OF</label>
                    {{ form.of_number }}
                </div>
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Statut</label>
                    {{ form.status }}
                </div>

                <!-- Ligne 2 : Client & Produit -->
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-gray-400 text-sm font-bold mb-2">Client</label>
                    {{ form.client }}
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-gray-400 text-sm font-bold mb-2">Produit Technique</label>
                    {{ form.product }}
                </div>

                <!-- Ligne 3 : Machine & Qté -->
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Machine</label>
                    {{ form.machine }}
                </div>
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Quantité Prévue (kg/m)</label>
                    {{ form.quantity_planned }}
                </div>

                <!-- Ligne 4 : Dates -->
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Début Prévu</label>
                    {{ form.start_time }}
                </div>
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Fin Prévue</label>
                    {{ form.end_time }}
                </div>

                <!-- BAT -->
                <div class="col-span-2 border-t border-slate-700 pt-4">
                    <label class="block text-gray-400 text-sm font-bold mb-2">BAT Validé (PDF)</label>
                    {{ form.bat_file }}
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-slate-700">
                <a href="{% url 'production_view' %}" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-4 rounded transition">Annuler</a>
                <button type="submit" class="bg-neon hover:bg-yellow-500 text-slate-900 font-bold py-2 px-6 rounded shadow-lg shadow-yellow-500/20 transition">💾 Valider l'Ordre</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
