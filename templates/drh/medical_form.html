{% extends 'base.html' %}

{% block content %}
<div class="mb-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">🏥 {{ titre }}</h1>
        <a href="{% url 'medical_list' %}" class="bg-slate-700 hover:bg-slate-600 text-white py-2 px-4 rounded transition text-sm">← Retour</a>
    </div>
</div>
<div class="max-w-2xl">
    <form method="post" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 space-y-4">
            <h2 class="text-lg font-bold text-white mb-2 flex items-center gap-2"><span>🏥</span> Détails de la Visite</h2>
            {% for field in form %}
            <div>
                <label class="block text-xs text-gray-400 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="text-red-400 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}
        </div>
        <div class="flex gap-4">
            <button type="submit" class="flex-1 bg-blue-500 hover:bg-blue-400 text-white font-bold py-3 rounded-lg transition">✓ Enregistrer</button>
            <a href="{% url 'medical_list' %}" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-6 rounded-lg transition">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
