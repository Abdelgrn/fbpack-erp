{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-2xl p-8">
        <h2 class="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-4">{{ titre }}</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="space-y-4">
                {% for field in form %}
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
            </div>
            <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-slate-700">
                <a href="{% url 'crm_view' %}" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-4 rounded transition">Annuler</a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded shadow-lg shadow-blue-500/20 transition">💾 Enregistrer</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
