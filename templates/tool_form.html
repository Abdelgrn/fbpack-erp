{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto mt-6">
    <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-2xl p-8">
        
        <h2 class="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-4">
            {{ titre }}
        </h2>

        <form method="post">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Produit (Pleine largeur) -->
                <div class="col-span-2">
                    <label class="block text-gray-400 text-sm font-bold mb-2">Produit Associé</label>
                    {{ form.product }}
                    <p class="text-xs text-gray-500 mt-1">Sélectionnez le produit pour lequel cet outil est fabriqué.</p>
                </div>

                <!-- Type et Série -->
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Type d'outil</label>
                    {{ form.tool_type }}
                </div>
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Numéro de Série / Gravure</label>
                    {{ form.serial_number }}
                </div>

                <!-- Usure -->
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Durée de vie max (tours)</label>
                    {{ form.max_impressions }}
                </div>
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Tours actuels</label>
                    {{ form.current_impressions }}
                </div>
            </div>

            <!-- Boutons -->
            <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-slate-700">
                <a href="{% url 'prepress_view' %}" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-4 rounded transition">
                    Annuler
                </a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded shadow-lg shadow-blue-500/20 transition">
                    💾 Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
